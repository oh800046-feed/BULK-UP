<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bulk Up Project Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-alt: #f8fafc;
      --text: #101828;
      --text-soft: #475467;
      --text-muted: #667085;
      --line: #d8dee9;
      --brand: #12365a;
      --brand-2: #1d4ed8;
      --accent: #8b1e2d;
      --success: #0f9f6e;
      --warning: #d97706;
      --danger: #dc2626;
      --hold: #6b7280;
      --shadow: 0 12px 28px rgba(16,24,40,.09);
      --radius: 14px;
      --header-h: 70px;
    }

    body.dark {
      --bg: #0b1220;
      --panel: #111a2d;
      --panel-alt: #152035;
      --text: #edf2f7;
      --text-soft: #d0d8e6;
      --text-muted: #94a3b8;
      --line: #263245;
      --brand: #4a90d9;
      --brand-2: #60a5fa;
      --accent: #d9485f;
      --success: #22c55e;
      --shadow: 0 16px 34px rgba(0,0,0,.34);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button, input, select, textarea { font: inherit; min-width: 0; }
    button {
      cursor: pointer;
      border: 0;
      border-radius: 10px;
      padding: 9px 14px;
      font-weight: 800;
      transition: .16s ease;
      max-width: 100%;
      white-space: normal;
    }
    button:hover { transform: translateY(-1px); }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 9px;
      padding: 9px 11px;
      outline: none;
    }
    textarea { min-height: 86px; resize: vertical; line-height: 1.55; }
    .shell, .main-wrap, .main-scroll, .page, .card, .portfolio-item, .org-card, .org-member, td, th, div, p, span {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: keep-all;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--brand-2); box-shadow: 0 0 0 3px rgba(29,78,216,.11); }

    .btn-primary { background: var(--brand); color: #fff; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-soft { background: var(--panel-alt); color: var(--text-soft); border: 1px solid var(--line); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-small { padding: 6px 10px; font-size: 12px; border-radius: 8px; }

    .login-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15,23,42,.58);
      backdrop-filter: blur(8px);
    }
    .login-overlay.show { display: flex; }
    .login-box {
      width: min(440px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .login-box h2 { margin: 0 0 8px; font-size: 25px; line-height: 1.25; }
    .login-box p { margin: 0 0 18px; color: var(--text-muted); line-height: 1.55; }
    .login-actions { display: flex; gap: 10px; margin-top: 12px; }
    .user-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-alt);
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 850;
    }
    .user-chip button { padding: 0; color: var(--text-muted); background: transparent; font-size: 12px; }

    .shell { min-height: 100vh; display: flex; }
    .sidebar {
      width: 300px;
      flex: 0 0 300px;
      background: linear-gradient(180deg, #111827 0%, #17243a 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: 8px 0 24px rgba(15,23,42,.18);
    }
    .sb-top { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .sb-logo { font-size: 12px; font-weight: 900; color: rgba(255,255,255,.68); letter-spacing: .06em; }
    .sb-project { margin-top: 12px; font-size: 27px; font-weight: 950; line-height: 1.12; }
    .sb-nav { flex: 1; overflow: auto; padding: 16px; }
    .sb-tab {
      width: 100%;
      display: block;
      text-align: left;
      margin-bottom: 10px;
      padding: 14px;
      background: rgba(255,255,255,.06);
      color: #fff;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
    }
    .sb-tab.active, .sb-tab:hover { background: rgba(255,255,255,.14); }
    .sb-tab-row { display: flex; align-items: stretch; gap: 8px; margin-bottom: 10px; }
    .sb-tab-row .sb-tab { flex: 1; margin-bottom: 0; }
    .sb-tab-delete {
      flex: 0 0 auto;
      padding: 8px 10px;
      background: rgba(220,38,38,.92);
      color: #fff;
      border: 1px solid rgba(255,255,255,.16);
      font-size: 12px;
      font-weight: 900;
    }
    .sb-tab-delete:hover { background: #ef4444; }
    .sb-tab-main { display: block; font-size: 15px; font-weight: 900; line-height: 1.35; }
    .sb-tab-sub { display: block; color: rgba(255,255,255,.7); font-size: 12px; line-height: 1.45; margin-top: 7px; word-break: keep-all; }
    .sb-bottom { padding: 16px; border-top: 1px solid rgba(255,255,255,.08); }
    .sb-create-btn {
      width: 100%;
      min-height: 46px;
      border-radius: 10px;
      background: #8b1e2d;
      color: #fff;
      border: 1px solid rgba(255,255,255,.14);
      font-size: 15px;
      font-weight: 950;
      box-shadow: 0 8px 18px rgba(139,30,45,.28);
    }
    .sb-create-btn:hover { background: #a82336; color: #fff; }

    .main-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100vh; }
    .header {
      height: var(--header-h);
      flex: 0 0 var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 26px;
      background: var(--brand);
      color: #fff;
      box-shadow: 0 4px 18px rgba(0,0,0,.18);
    }
    .header-left { display: flex; align-items: center; gap: 16px; min-width: 0; }
    .header-eyebrow { font-size: 11px; font-weight: 900; color: rgba(255,255,255,.63); letter-spacing: .08em; }
    .header-title { font-size: 22px; font-weight: 950; line-height: 1.2; }
    .header-badge { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: 999px; background: rgba(255,255,255,.13); font-size: 12px; font-weight: 900; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }
    .date-range { color: rgba(255,255,255,.76); font-size: 13px; font-weight: 800; }
    .project-deadline-editor { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 9px; }
    .project-deadline-editor label { color: var(--text-muted); font-size: 12px; font-weight: 900; }
    .project-deadline-editor input { width: auto; min-width: 160px; }
    .header-right { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .hbtn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 42px;
      padding: 10px 16px;
      border-radius: 11px;
      background: #f8fafc;
      color: #111827;
      border: 1px solid #d5deea;
      box-shadow: 0 1px 2px rgba(15,23,42,.04);
      font-size: 14px;
      font-weight: 900;
    }
    .hbtn:hover { background: #fff; border-color: #c7d2e2; }
    .hbtn-save { background: #0f9f6e; color: #fff; border-color: #0f9f6e; }
    .hbtn-save:hover { background: #0b8d61; border-color: #0b8d61; }
    .hbtn-edit { background: #fff; color: #8b1e2d; border-color: #8b1e2d; }
    .hbtn-edit.active { background: #8b1e2d; color: #fff; }

    .main-scroll { flex: 1; overflow: auto; }
    .page { max-width: 1460px; margin: 0 auto; padding: 26px 28px 56px; }
    .view { display: none; }
    .view.active { display: block; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .card-pad { padding: 18px 20px; }
    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin: 22px 0 13px; }
    .section-title { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 950; }
    .sec-num { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 8px; background: var(--brand); color: #fff; font-size: 14px; }
    .subtle { color: var(--text-muted); font-size: 13px; }

    .kpi-strip { display: grid; grid-template-columns: repeat(4, minmax(170px, 1fr)); gap: 14px; }
    .kpi-card {
      position: relative;
      overflow: hidden;
      padding: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .kpi-card::before { content: ""; position: absolute; inset: 0 0 auto; height: 4px; background: var(--kpi, var(--brand)); }
    .kpi-label { color: var(--text-muted); font-size: 12px; font-weight: 900; letter-spacing: .04em; text-transform: uppercase; }
    .kpi-value { margin-top: 8px; font-size: 31px; font-weight: 950; line-height: 1; }
    .kpi-sub { margin-top: 8px; color: var(--text-muted); font-size: 12px; }

    .overview-grid { display: grid; grid-template-columns: 1.35fr .9fr; gap: 16px; }
    .meta-table { width: 100%; border-collapse: collapse; }
    .meta-table td { padding: 10px 0; border-bottom: 1px solid var(--line); vertical-align: top; font-size: 14px; line-height: 1.55; }
    .meta-table tr:last-child td { border-bottom: 0; }
    .meta-table td:first-child { width: 130px; color: var(--text-muted); font-weight: 900; }
    .activity-list { display: grid; gap: 10px; }
    .activity-item { display: grid; grid-template-columns: 32px 1fr; gap: 10px; align-items: start; padding: 12px; border: 1px solid var(--line); border-radius: 11px; background: var(--panel-alt); }
    .activity-n { display: grid; place-items: center; width: 28px; height: 28px; border-radius: 8px; background: var(--brand); color: #fff; font-size: 13px; font-weight: 950; }
    .activity-text { font-size: 14px; font-weight: 750; line-height: 1.5; }

    .portfolio-list { display: flex; flex-direction: column; gap: 12px; }
    .portfolio-item {
      display: grid;
      grid-template-columns: minmax(0, 3fr) 90px minmax(0, 1.5fr) 72px;
      gap: 14px;
      align-items: center;
      padding: 16px 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 13px;
      box-shadow: 0 4px 14px rgba(16,24,40,.04);
      cursor: pointer;
    }
    .portfolio-item:hover { border-color: var(--brand-2); }
    .portfolio-title { font-size: 16px; font-weight: 950; line-height: 1.35; overflow-wrap: anywhere; word-break: keep-all; }
    .portfolio-meta { margin-top: 6px; color: var(--text-muted); font-size: 12px; line-height: 1.55; }
    .portfolio-count { font-size: 14px; font-weight: 950; text-align: center; }
    .progress-wrap { display: flex; align-items: center; gap: 10px; }
    .track { flex: 1; height: 9px; background: #eaf0f7; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
    body.dark .track { background: #1e293b; }
    .fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #60a5fa, #1d4ed8); }
    .pct { min-width: 42px; text-align: right; font-size: 13px; font-weight: 950; }
    .pill { display: inline-flex; align-items: center; justify-content: center; min-height: 26px; padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 900; }
    .pill.normal { background: rgba(15,159,110,.12); color: var(--success); }
    .pill.wip { background: rgba(29,78,216,.12); color: var(--brand-2); }
    .pill.done { background: rgba(17,24,39,.12); color: var(--text); }
    .pill.hold { background: rgba(107,114,128,.14); color: var(--hold); }

    .chart-grid { display: grid; grid-template-columns: minmax(260px, .9fr) minmax(420px, 1.5fr); gap: 16px; }
    .chart-container { height: 260px; position: relative; }
    .donut-css {
      width: min(210px, 72%);
      aspect-ratio: 1;
      margin: 14px auto 10px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) calc(var(--pct) * 1%), #d8dee9 0);
      position: relative;
      display: grid;
      place-items: center;
    }
    body.dark .donut-css { background: conic-gradient(var(--accent) calc(var(--pct) * 1%), #263245 0); }
    .donut-css::after {
      content: "";
      position: absolute;
      width: 68%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--panel);
    }
    .donut-label { position: relative; z-index: 1; text-align: center; }
    .donut-label strong { display: block; font-size: 30px; line-height: 1; }
    .donut-label span { display: block; margin-top: 6px; color: var(--text-muted); font-size: 12px; font-weight: 900; }
    .comparison-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .comparison-table th, .comparison-table td { padding: 11px 10px; border-bottom: 1px solid var(--line); font-size: 13px; text-align: left; }
    .comparison-table th { color: var(--text-muted); font-weight: 950; background: var(--panel-alt); }
    .comparison-table tr:last-child td { border-bottom: 0; }

    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .tab { background: var(--panel-alt); color: var(--text-soft); border: 1px solid var(--line); border-radius: 999px; }
    .tab.active { background: var(--brand); color: #fff; border-color: var(--brand); }

    .timeline-wrap { overflow-x: auto; padding-bottom: 8px; }
    .timeline-legend { display: flex; align-items: center; gap: 10px; margin: 0 0 10px; color: var(--text-muted); font-size: 12px; font-weight: 850; }
    .timeline-legend span { display: inline-flex; align-items: center; gap: 5px; }
    .timeline-legend i { width: 9px; height: 9px; border-radius: 3px; display: inline-block; }
    .timeline-table { width: 100%; min-width: 1180px; border-collapse: collapse; table-layout: fixed; }
    .timeline-table th, .timeline-table td { border: 1px solid var(--line); padding: 0; font-size: 12px; text-align: center; }
    .timeline-table th { height: 28px; background: var(--panel-alt); color: var(--text-muted); font-weight: 950; }
    .timeline-meta-1 { width: 245px; text-align: left !important; padding: 10px 9px !important; color: var(--text); font-weight: 850; overflow-wrap: anywhere; word-break: keep-all; }
    .timeline-meta-2 { width: 92px; padding: 10px 8px !important; }
    .timeline-meta-3 { width: 180px; text-align: left !important; padding: 10px 8px !important; overflow-wrap: anywhere; word-break: keep-all; }
    .tl-week { width: 34px; min-width: 34px; height: 34px; background: rgba(248,250,252,.72); }
    .tl-active { background: rgba(29,78,216,.58); }
    .tl-active.tl-c2 { background: rgba(15,159,110,.58); }
    .tl-active.tl-c3 { background: rgba(139,30,45,.62); }
    .tl-active.tl-done { background: rgba(15,159,110,.7); }
    .tl-active.tl-hold { background: rgba(107,114,128,.58); }
    .tl-active.tl-wip { background: rgba(29,78,216,.58); }

    .org-wrap { padding: 20px; border-radius: 12px; }
    .org-headline { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
    .org-headline h3 { margin: 0; font-size: 18px; font-weight: 950; color: var(--text); }
    .org-grid {
      display: grid;
      grid-template-columns: minmax(220px, .9fr) minmax(220px, .9fr) minmax(280px, 1fr);
      gap: 16px;
      align-items: start;
    }
    .org-col { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
    .org-card {
      min-height: 112px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, var(--panel), var(--panel-alt));
      padding: 16px;
    }
    .org-card-label {
      display: block;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 950;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .org-name { font-size: 18px; font-weight: 950; line-height: 1.35; color: var(--text); }
    .org-role { margin-top: 5px; color: var(--text-muted); font-size: 13px; font-weight: 750; }
    .org-member-list {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, var(--panel), var(--panel-alt));
      padding: 14px;
    }
    .org-member-head { color: var(--text-muted); font-size: 12px; font-weight: 950; margin-bottom: 10px; }
    .org-member {
      padding: 11px 12px;
      border: 1px dashed var(--line-strong);
      border-radius: 12px;
      margin-bottom: 10px;
      background: rgba(255,255,255,.35);
    }
    body.dark .org-member { background: rgba(255,255,255,.04); }
    .org-member:last-child { margin-bottom: 0; }
    .org-member-name { font-weight: 900; line-height: 1.35; }
    .org-member-role { margin-top: 3px; color: var(--text-muted); font-size: 12px; }
    .org-edit-input { margin-top: 3px; font-size: 16px; font-weight: 900; }
    .org-edit-role { margin-top: 8px; font-size: 13px; color: var(--text-soft); }
    .org-member-edit-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.25fr) auto;
      gap: 8px;
      align-items: center;
    }
    .org-member-edit-grid input { padding: 8px 9px; font-size: 13px; }
    @media (max-width: 620px) {
      .org-member-edit-grid { grid-template-columns: 1fr; }
      .org-member-edit-grid .btn-danger { width: 100%; }
    }

    .detail-grid { display: grid; grid-template-columns: minmax(360px, 1fr) minmax(420px, 1.3fr); gap: 16px; }
    .detail-hero { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--line); box-shadow: var(--shadow); margin-bottom: 18px; }
    .detail-head { padding: 22px 24px; color: #fff; background: linear-gradient(135deg, var(--brand), var(--brand-2)); }
    .detail-label { font-size: 11px; font-weight: 950; color: rgba(255,255,255,.68); letter-spacing: .08em; }
    .detail-title { margin-top: 7px; font-size: 21px; font-weight: 950; line-height: 1.35; overflow-wrap: anywhere; word-break: keep-all; }
    .detail-title-input {
      margin-top: 8px;
      border-color: rgba(255,255,255,.34);
      background: rgba(255,255,255,.12);
      color: #fff;
      font-size: 20px;
      font-weight: 900;
    }
    .detail-body { padding: 18px 22px; background: var(--panel); }
    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(160px, 1fr)); gap: 10px; }
    .field-grid label, .library-toolbar label, .task-editor label { display: block; color: var(--text-muted); font-size: 12px; font-weight: 900; margin-bottom: 6px; }
    .task-list { display: flex; flex-direction: column; gap: 9px; }
    .task-item {
      display: grid;
      grid-template-columns: 28px 1fr auto auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      background: var(--panel-alt);
      border: 1px solid var(--line);
      border-radius: 10px;
    }
    .task-chk { display: grid; place-items: center; width: 25px; height: 25px; border-radius: 7px; border: 2px solid #b9c5d4; font-size: 13px; font-weight: 950; }
    .task-item[data-status="wip"] .task-chk { background: var(--brand-2); border-color: var(--brand-2); color: #fff; }
    .task-item[data-status="done"] .task-chk { background: var(--success); border-color: var(--success); color: #fff; }
    .task-title { font-size: 14px; font-weight: 850; line-height: 1.45; overflow-wrap: anywhere; word-break: keep-all; }
    .task-meta { margin-top: 4px; color: var(--text-muted); font-size: 12px; line-height: 1.5; }
    .task-editor { display: grid; grid-template-columns: 1.4fr .8fr .8fr .65fr auto; gap: 10px; align-items: end; margin-top: 13px; padding-top: 13px; border-top: 1px solid var(--line); }
    .wbs-table { width: 100%; border-collapse: collapse; min-width: 1420px; table-layout: fixed; }
    .wbs-table th, .wbs-table td { padding: 10px 9px; border-bottom: 1px solid var(--line); vertical-align: top; font-size: 13px; }
    .wbs-table th { background: var(--panel-alt); color: var(--text-muted); text-align: left; font-weight: 950; }
    .wbs-table tr.lv1 td { background: rgba(29,78,216,.045); font-weight: 850; }
    .wbs-name { width: 230px; }
    .wbs-text { white-space: normal; overflow-wrap: anywhere; word-break: keep-all; }
    .wbs-small { width: 110px; }
    .wbs-date { width: 124px; }
    .wbs-progress { width: 86px; }
    .wbs-status { width: 105px; }
    .wbs-attach { width: 150px; }
    .wbs-actions { width: 132px; }
    .wbs-table input, .wbs-table select, .wbs-table textarea { width: 100%; }
    .wbs-table textarea { min-height: 44px; }
    .wbs-table .library-actions { justify-content: flex-start; }

function clone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, '&#96;');
}

function todayStr() {

  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function parseTaskDate(value) {
  if (!value) return null;
  const d = new Date(`${value}T00:00:00`);
  return Number.isNaN(d.getTime()) ? null : d;
}

}

function calcIssue(issue) {
  const leafTasks = issue.tasks.filter(task => !issue.tasks.some(child => child.parentId === task.id));
  const base = leafTasks.length ? leafTasks : issue.tasks;
  const total = base.length;
  const done = base.filter(t => isTaskComplete(t)).length;
  const wip = base.filter(t => t.status === 'wip').length;
  const pct = total ? Math.round(done / total * 100) : 0;
  return { total, done, wip, pct };
}

function isTaskComplete(task, issue = null) {
  const hasOutput = String(task.output || '').trim().length > 0;
  if (task.status !== 'done' || !hasOutput) return false;
  if (!issue) return true;
  const children = getTaskChildren(issue, task.id);
  if (!children.length) return true;
  return taskTreeHasAttachment(issue, task.id);
}

function getTaskChildren(issue, taskId) {
  return (issue?.tasks || []).filter(child => child.parentId === taskId);
}

function getTaskDescendants(issue, taskId) {
  const descendants = [];
  const walk = id => {
    getTaskChildren(issue, id).forEach(child => {
      descendants.push(child);
      walk(child.id);
    });
  };
  walk(taskId);
  return descendants;
}

function taskHasAttachment(task) {
  return Boolean(task?.attachment?.dataUrl || task?.attachment?.storagePath || task?.attachment?.name);
}

function taskTreeHasAttachment(issue, taskId) {
  const task = (issue?.tasks || []).find(item => item.id === taskId);
  return [task, ...getTaskDescendants(issue, taskId)].some(taskHasAttachment);
}

function calcOverall() {
  const totals = data.issues.map(calcIssue);
  const total = totals.reduce((sum, row) => sum + row.total, 0);
  const done = totals.reduce((sum, row) => sum + row.done, 0);
  const wip = totals.reduce((sum, row) => sum + row.wip, 0);
  return { total, done, wip, pct: total ? Math.round(done / total * 100) : 0 };
}

function normalizeProjectDate(value) {
  const match = String(value ?? '').trim().match(/^(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})$/);
  if (!match) return '';
  const normalized = `${match[1]}-${String(match[2]).padStart(2, '0')}-${String(match[3]).padStart(2, '0')}`;
  const date = parseTaskDate(normalized);
  if (!date || date.getFullYear() !== Number(match[1]) || date.getMonth() + 1 !== Number(match[2]) || date.getDate() !== Number(match[3])) return '';
  return normalized;
}

function formatProjectDate(value) {
  const date = parseTaskDate(value);
  if (!date) return '';
  const yyyy = date.getFullYear();
  const mm = String(date.getMonth() + 1).padStart(2, '0');
  const dd = String(date.getDate()).padStart(2, '0');
  return `${yyyy}.${mm}.${dd}`;
}

function getProjectPeriodText() {
  const start = formatProjectDate(data.project?.startDate);
  const end = formatProjectDate(data.project?.endDate);
  if (start && end) return `${start} ~ ${end}`;
  if (start) return `${start} ~`;
  if (end) return `~ ${end}`;
  return String(data.project?.period || '-');
}

function projectDurationDays() {
  const start = parseTaskDate(data.project?.startDate);
  const end = parseTaskDate(data.project?.endDate);
  if (!start || !end || end < start) return 0;
  return Math.floor((end - start) / 86400000) + 1;
}

function daysLeft() {
  const end = parseTaskDate(data.project?.endDate);
  if (!end) return 0;
  const now = new Date();
  now.setHours(0,0,0,0);
  return Math.max(0, Math.ceil((end - now) / 86400000));
}

function ensureProjectData() {
  const defaults = clone(defaultData.project);

}
function buildTimeline(tasks) {
  const rows = tasks || [];
  if (!rows.length) return '<div class="empty">표시할 일정이 없습니다.</div>';

  const datedRows = rows.filter(row => parseTaskDate(row.start) && parseTaskDate(row.end));
  if (!datedRows.length) return '<div class="empty">시작일과 종료일이 입력된 상세 과제가 없어 Time table을 표시하지 않습니다.</div>';

  const weeks = generateTimelineWeeks(datedRows);
  const monthHeaders = buildTimelineMonthHeaders(weeks);

  return `
    <div class="timeline-legend">
      <span><i style="background:#1d4ed8"></i>진행</span>
      <span><i style="background:#0f9f6e"></i>완료</span>
      <span><i style="background:#6b7280"></i>보류</span>
    </div>
    <div class="timeline-wrap">
      <table class="timeline-table">
        <thead>
          <tr>
            <th class="timeline-meta-1" rowspan="2">프로젝트 / 과제</th>
            <th class="timeline-meta-2" rowspan="2">Owner</th>
            <th class="timeline-meta-3" rowspan="2">비고</th>
            ${monthHeaders.map(m => `<th colspan="${m.span}">${m.month}월</th>`).join('')}
          </tr>
          <tr>
            ${weeks.map(w => `<th>W${w.weekNo}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${datedRows.map(row => {
            const start = parseTaskDate(row.start);
            const finish = parseTaskDate(row.end);
            return `
              <tr>
                <td class="timeline-meta-1">
                  ${escapeHtml(row.name)}
                  <div class="file-meta">${escapeHtml(row.issueTitle || '')} · ${escapeHtml(row.owner || '-')}</div>
                </td>
                <td class="timeline-meta-2">${escapeHtml(row.owner || '-')}</td>
                <td class="timeline-meta-3">${escapeHtml(row.output || row.goal || row.delayReason || '-')}</td>
                ${weeks.map(w => {
                  const active = w.start <= finish && w.end >= start;
                  const colorCls = row.color === '#0f9f6e' ? 'tl-c2' : row.color === '#8b1e2d' ? 'tl-c3' : 'tl-c1';
                  const statusCls = row.status === 'done' ? 'tl-done' : row.status === 'hold' ? 'tl-hold' : 'tl-wip';
                  const title = `${row.name || ''} / ${row.start || '-'} ~ ${row.end || '-'} / ${Number(row.progress || 0)}%`;
                  return `<td class="tl-week ${active ? `tl-active ${colorCls} ${statusCls}` : ''}" title="${escapeAttr(title)}"></td>`;
                }).join('')}
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function generateTimelineWeeks(rows) {
  const allDates = rows.flatMap(row => [parseTaskDate(row.start), parseTaskDate(row.end)]).filter(Boolean);
  const projectStart = parseTaskDate(data.project?.startDate);
  const projectEnd = parseTaskDate(data.project?.endDate);
  let cur = new Date(Math.min(...[...allDates, projectStart].filter(Boolean).map(d => d.getTime())));
  const end = new Date(Math.max(...[...allDates, projectEnd].filter(Boolean).map(d => d.getTime())));
  cur = new Date(cur.getFullYear(), cur.getMonth(), 1);
  const weeks = [];
  while (cur <= end) {
    const month = cur.getMonth();
    for (let weekNo = 1; weekNo <= 4; weekNo++) {
      const start = new Date(cur.getFullYear(), month, (weekNo - 1) * 7 + 1);
      const finish = weekNo === 4 ? new Date(cur.getFullYear(), month + 1, 0) : new Date(cur.getFullYear(), month, weekNo * 7);
      if (finish >= cur && start <= end) weeks.push({ start, end: finish, month: month + 1, weekNo });
    }
    cur = new Date(cur.getFullYear(), month + 1, 1);
  }
  return weeks;
}

function buildTimelineMonthHeaders(weeks) {
  const headers = [];
  weeks.forEach(week => {
    const last = headers[headers.length - 1];
    if (last && last.month === week.month) last.span += 1;
    else headers.push({ month: week.month, span: 1 });
  });
  return headers;
}

function ensureIssueTasks(issue) {
  if (!issue || !Array.isArray(issue.tasks)) return;
  issue.tasks.forEach((task, idx) => {
    if (!task.id) task.id = `${issue.no || 'task'}-${idx + 1}`;
    if (!('parentId' in task)) task.parentId = null;
    if (!task.level) task.level = task.parentId ? 2 : 1;
    if (!('status' in task)) task.status = 'none';
    if (!('start' in task)) task.start = '';
    if (!('end' in task)) task.end = '';
    if (!('owner' in task)) task.owner = issue.leader || '';
    if (!('goal' in task)) task.goal = '';
    if (!('output' in task)) task.output = '';
    if (!('progress' in task)) task.progress = task.status === 'done' ? 100 : task.status === 'wip' ? 50 : 0;
    if (!('delayReason' in task)) task.delayReason = '';
    if (!('submitStatus' in task)) task.submitStatus = '미제출';
    if (!('attachment' in task)) task.attachment = null;
    normalizeTaskCompletion(task, false, issue);
  });
  recalcIssueHierarchy(issue);
}

function normalizeTaskCompletion(task, showMessage = true, issue = null) {
  const hasOutput = String(task.output || '').trim().length > 0;
  if (!hasOutput && (Number(task.progress || 0) >= 100 || task.status === 'done')) {
    task.progress = 99;
    task.status = 'wip';
    if (showMessage) alert('산출물을 입력해야 진행률을 100%로 변경할 수 있습니다.');
    return false;
  }
  if (issue && !task.parentId && (Number(task.progress || 0) >= 100 || task.status === 'done') && !taskTreeHasAttachment(issue, task.id)) {
    task.progress = 99;
    task.status = 'wip';
    if (showMessage) alert('메인과제는 하위 과제를 포함해 첨부파일이 최소 1개 있어야 완료 처리할 수 있습니다.');
    return false;
  }
  if (hasOutput && Number(task.progress || 0) >= 100) {
    task.progress = 100;
    task.status = 'done';
  }
  return true;
}

function recalcIssueHierarchy(issue) {
  const levels = [...new Set((issue.tasks || []).map(task => Number(task.level || 1)))].sort((a, b) => b - a);
  levels.forEach(level => {
    issue.tasks.filter(task => Number(task.level || 1) === level - 1).forEach(parent => {
      const children = issue.tasks.filter(child => child.parentId === parent.id);
      if (!children.length) return;
      const avg = Math.round(children.reduce((sum, child) => sum + Number(child.progress || 0), 0) / children.length);
      parent.progress = avg;
      const allChildrenComplete = children.every(child => {
        const grandChildren = getTaskChildren(issue, child.id);
        return grandChildren.length ? child.status === 'done' : isTaskComplete(child, issue);
      });
      const canCompleteParent = allChildrenComplete && (parent.parentId || taskTreeHasAttachment(issue, parent.id));
      parent.status = canCompleteParent ? 'done' : avg > 0 ? 'wip' : 'none';
      if (parent.status !== 'done' && Number(parent.progress || 0) >= 100) parent.progress = 99;
    });
  });
}

function updateTaskField(issueId, taskId, field, value) {
  const issue = issueById(issueId);
  const task = issue?.tasks.find(t => t.id === taskId);
  if (!task) return;
  if (field === 'progress') {
    const next = Math.max(0, Math.min(100, Number(value || 0)));
    task.progress = next;
    if (next >= 100) task.status = 'done';
    else if (next > 0 && task.status === 'none') task.status = 'wip';
    normalizeTaskCompletion(task, true, issue);
  } else {
    task[field] = value;
    if (field === 'status') {
      if (value === 'done') task.progress = 100;
      if (value === 'none' && Number(task.progress || 0) > 0) task.progress = 0;
    }
    if (field === 'output' || field === 'status') normalizeTaskCompletion(task, true, issue);
  }
  recalcIssueHierarchy(issue);
  saveAll(false);
  renderAll();
  switchTab(issueId);
}

function handleTaskAttachment(issueId, taskId, file) {
  const issue = issueById(issueId);
  const task = issue?.tasks.find(t => t.id === taskId);
  if (!task || !file) return;
  const ext = (file.name.split('.').pop() || '').toLowerCase();
  if (!TASK_ATTACHMENT_EXTS.includes(ext)) {
    alert('첨부 가능 형식은 Word, HWP, Excel, PPT 파일입니다.');
    return;
  }
  if (file.size > TASK_ATTACHMENT_MAX_SIZE) {
    alert('첨부파일은 8MB 이하만 저장할 수 있습니다.');
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    task.attachment = {
      name: file.name,
      type: file.type || 'application/octet-stream',
      size: file.size,
      dataUrl: reader.result,
      uploadedAt: todayStr()
    };
    saveAll(false);
    renderAll();
    switchTab(issueId);
  };
  reader.onerror = () => alert('파일을 읽는 중 오류가 발생했습니다.');
  reader.readAsDataURL(file);
}

function deleteTask(issueId, taskId) {
  if (!confirm('선택한 과제와 하위 과제를 삭제하시겠습니까?')) return;
  const issue = issueById(issueId);
  if (!issue) return;
  const del = new Set();
  const walk = id => {
    del.add(id);
    issue.tasks.filter(t => t.parentId === id).forEach(child => walk(child.id));
  };
  walk(taskId);
  issue.tasks = issue.tasks.filter(t => !del.has(t.id));
  saveAll(false);
  renderAll();
  switchTab(issueId);
}

async function loadFromSupabase() {
  if (!supabaseEnabled || !supabaseClient) return false;
  try {
    const { data: row, error } = await supabaseClient
      .from('app_state')
      .select('data')
      .eq('id', APP_STATE_ID)
      .maybeSingle();

    if (error) throw error;
    if (!row?.data || Object.keys(row.data).length === 0) {
      await saveToSupabaseQuietly(true);
      return false;
    }

    data = { ...clone(defaultData), ...row.data };
    if (!Array.isArray(data.issues) || data.issues.length < 3) data.issues = clone(defaultData.issues);
    clearPresetTimetableDates(data);
    ensureProjectData();
    ensureOrgData();
    normalizeAllIssues();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    return true;
  } catch (err) {
    console.error('Supabase 데이터 로드 실패', err);
    alert('Supabase 데이터 로드에 실패했습니다. 로컬 저장 데이터를 사용합니다.');
    return false;
  }
}

async function saveToSupabaseQuietly(force = false) {
  if (!supabaseEnabled || !supabaseClient) return;
  const now = Date.now();
  if (!force && now - lastSupabaseSaveAt < 500) return;
  lastSupabaseSaveAt = now;
  try {
    const { error } = await supabaseClient
      .from('app_state')
      .upsert({
        id: APP_STATE_ID,
        data
      });
    if (error) throw error;
  } catch (err) {
    console.error('Supabase 저장 실패', err);
  }
}

function clearPresetTimetableDates(state) {
  const presetDates = {
    '1-1': ['2026-06-29', '2026-07-10'],
    '1-2': ['2026-07-08', '2026-07-24'],
    '1-3': ['2026-07-22', '2026-08-07'],
    '1-4': ['2026-08-05', '2026-08-21'],
    '2-1': ['2026-06-29', '2026-07-12'],
    '2-2': ['2026-07-10', '2026-07-28'],
    '2-3': ['2026-07-24', '2026-08-14'],
    '2-4': ['2026-08-10', '2026-08-28'],
    '3-1': ['2026-06-29', '2026-07-17'],
    '3-2': ['2026-07-15', '2026-08-05'],
    '3-3': ['2026-08-03', '2026-08-21'],
    '3-4': ['2026-08-17', '2026-08-31']
  };
  (state.issues || []).forEach(issue => {
    (issue.tasks || []).forEach(task => {
      const preset = presetDates[task.id];
      if (preset && task.start === preset[0] && task.end === preset[1]) {
        task.start = '';
        task.end = '';
      }
    });
  });
}

function loadState() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) return;
  try {
    const parsed = JSON.parse(saved);
    data = { ...clone(defaultData), ...parsed };
    if (!Array.isArray(data.issues) || data.issues.length < 3) data.issues = clone(defaultData.issues);
    clearPresetTimetableDates(data);
    ensureProjectData();
    ensureOrgData();
    normalizeAllIssues();
  } catch (err) {
    console.warn('저장 데이터 복원 실패', err);
  }
}

function resetDemoData() {
  if (!confirm('저장된 변경사항을 초기 데이터로 복원하시겠습니까?')) return;
  data = clone(defaultData);
  saveAll(false);
  renderAll();
  switchTab('summary');
}

function toggleTheme() {
  data.theme = data.theme === 'dark' ? 'light' : 'dark';
  saveAll(false);
  renderAll();
  switchTab(activeTab);
}

window.addEventListener('DOMContentLoaded', async () => {
  initSupabase();
  loadState();
  await loadFromSupabase();
  restoreLogin();
  renderAll();
});

window.addEventListener('keydown', event => {
  if (event.key === 'Escape') closeMinutesModal();
});
</script>
</body>
